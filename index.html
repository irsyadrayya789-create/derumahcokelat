<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #333; color: white; text-align: center; padding: 20px; }
        nav { background: #444; padding: 10px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }
        main { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; }
        footer { text-align: center; background: #333; color: white; padding: 10px; margin-top: 20px; }
        button { background: #0078ff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<header>
    <h1>Welcome to My Website</h1>
    <p>A simple HTML page</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<main>
    <h2>Hello!</h2>
    <p>This is a simple website built using HTML, CSS, and JavaScript.</p>
    <button onclick="showMessage()">Click Me</button>
    <p id="message"></p>
</main>

<footer>
    <p>&copy; 2026 My Website</p>
</footer>

<script>
function showMessage() {
    document.getElementById("message").textContent = "Thanks for clicking the button!";
}
</script>
</body>
</html>
