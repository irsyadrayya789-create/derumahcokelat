<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chocolate Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background: radial-gradient(circle at top, #1a0f0a, #0b0705);
  color:#fff;
}

/* HERO */
.hero{
  padding:60px 20px;
  text-align:center;
  background: linear-gradient(135deg, rgba(200,155,106,0.15), rgba(0,0,0,0.4));
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.hero h1{
  font-size:38px;
  letter-spacing:1px;
}

.hero p{
  margin-top:10px;
  color:#c89b6a;
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  gap:12px;
  padding:15px;
  flex-wrap:wrap;
}

nav button{
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter: blur(10px);
}

nav button:hover{
  background:#c89b6a;
  color:#120b08;
  transform: translateY(-2px);
}

/* CONTAINER */
.container{
  padding:25px;
  max-width:1000px;
  margin:auto;
}

.menu-section{
  display:none;
  animation: fade 0.4s ease;
}

.menu-section.active{
  display:block;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* GRID CARDS */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:15px;
}

.card{
  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  padding:15px;
  border-radius:16px;
  transition:0.3s;
}

.card:hover{
  transform: translateY(-5px);
  border-color:#c89b6a;
}

.card h3{
  margin-bottom:5px;
}

.price{
  color:#c89b6a;
  font-weight:600;
}

footer{
  text-align:center;
  padding:20px;
  color:#777;
  margin-top:30px;
}

@media(max-width:600px){
  .hero h1{font-size:26px;}
}
</style>
</head>

<link rel="stylesheet" href="style.css">

<body>


<div class="hero">
  <h1>De Rumah Cokelat Inspired Menu</h1>
  <p>Warm • Cozy • Premium Taste Experience</p>
</div>

  <div id="food" class="menu-section active">
<a class="card"
   href="https://wa.me/628117269594?text=Halo,%20saya%20ingin%20pesan%20Brownies%20Mini"
   target="_blank">

    <img src="brownies.png" alt="Brownies">

    <div class="info">
        <h3>Brownies Mini</h3>
        <p>Rp 2.000</p>
    </div>
  </a>
     <a class="card" href="https://wa.me/628117269594?text=Halo..." target="_blank">
        <img src="pizza.png" alt="Pizza">
        <div class="info">
            <h3>Mini Pizza</h3>
            <p>Rp 2.000</p>
        </div>
    </a> <div class="card" onclick="toggleSizes()">
        <img src="browniess.png" alt="Brownies">
        <div class="info">
            <h3>Brownies Reguler</h3>
            <p>Click to choose size</p>
        </div>
    </div>
<div id="sizeOptions" class="size-options">

    <a class="size-card"
       href="https://wa.me/628117269594?text=Halo,%20saya%20ingin%20pesan%20Brownies%20Reguler%20Ukuran%20Small"
       target="_blank">
        <h4>Small</h4>
        <p>Rp 40.000</p>
    </a>

    <a class="size-card"
       href="https://wa.me/628117269594?text=Halo,%20saya%20ingin%20pesan%20Brownies%20Reguler%20Ukuran%20Medium"
       target="_blank">
        <h4>Medium</h4>
        <p>Rp 55.000</p>
    </a>

    <a class="size-card"
       href="https://wa.me/628117269594?text=Halo,%20saya%20ingin%20pesan%20Brownies%20Reguler%20Ukuran%20Large"
       target="_blank">
        <h4>Large</h4>
        <p>Rp 70.000</p>
    </a>

</div>
    </div>
  </div>

</div>

<footer>
  © 2026 Chocolate Menu Theme
</footer>

<script>
function showMenu(id){
  document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

<script>
function toggleSizes() {
    const sizes = document.getElementById("sizeOptions");

    if (sizes.style.display === "block") {
        sizes.style.display = "none";
    } else {
        sizes.style.display = "block";
    }
}
</script>

</body>
</html>
