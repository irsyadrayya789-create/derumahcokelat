<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Derumah Cokelat</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c1d11; color: #fff; padding: 20px; }
    h1 { color: #ff9f43; border-bottom: 2px solid #4a3525; padding-bottom: 10px; }
    .card-pesanan { background-color: #4a3525; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-left: 5px solid #ff9f43; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card-pesanan h3 { margin: 0 0 10px 0; color: #ff9f43; }
    .card-pesanan p { margin: 5px 0; }
    small { color: #ccc; }
  </style>
</head>
<body>

  <h1>Daftar Pesanan Masuk (Real-Time)</h1>
  <div id="kontainer-pesanan">Membuka koneksi ke server pesanan...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdig7gTvPCRHic6L9kGJFFMh4Li8apn3s",
      authDomain: "derumahcokelat-3b51e.firebaseapp.com",
      projectId: "derumahcokelat-3b51e",
      storageBucket: "derumahcokelat-3b51e.firebasestorage.app",
      messagingSenderId: "893799280902",
      appId: "1:893799280902:web:0555619ea36dc39eaaee87",
      measurementId: "G-BXQSLKMDGK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const kontainer = document.getElementById('kontainer-pesanan');

    // Mengambil data pesanan terupdate
    const q = query(collection(db, "pesanan"), orderBy("waktu", "desc"));

    // Menampilkan data secara real-time
    onSnapshot(q, (snapshot) => {
      kontainer.innerHTML = "";

      if (snapshot.empty) {
        kontainer.innerHTML = "<p>Belum ada pesanan cokelat masuk saat ini.</p>";
        return;
      }

      snapshot.forEach((doc) => {
        const data = doc.data();
        const card = document.createElement('div');
        card.className = 'card-pesanan';
        card.innerHTML = `
          <h3>Pelanggan: ${data.namaPembeli}</h3>
          <p><strong>Pesanan:</strong> ${data.menuPesanan}</p>
          <p><strong>Jumlah:</strong> ${data.qty} pcs</p>
          <small>Waktu Masuk: ${data.waktu ? new Date(data.waktu.toDate()).toLocaleString('id-ID') : 'Memproses waktu...'}</small>
        `;
        kontainer.appendChild(card);
      });
    });
  </script>
</body>
</html>
